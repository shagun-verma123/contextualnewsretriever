spring.application.name=contextualnewsretriever

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:newsdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# LLM configuration - defaults to the zero-dependency mock implementation
llm.provider=mock
llm.openai.api-key=
llm.openai.model=gpt-4o-mini

# Trending cache
trending.cache.ttl-minutes=5
